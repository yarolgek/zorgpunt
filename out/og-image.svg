<svg width="1200" height="630" viewBox="0 0 1200 630" fill="none" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1200" y2="630" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#FAFAFA"/>
      <stop offset="1" stop-color="#F7F5F0"/>
    </linearGradient>
    <linearGradient id="accent" x1="140" y1="120" x2="1060" y2="520" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#759940" stop-opacity="0.22"/>
      <stop offset="1" stop-color="#006AA5" stop-opacity="0.22"/>
    </linearGradient>
    <filter id="shadow" x="-20" y="-20" width="1240" height="670" color-interpolation-filters="sRGB">
      <feDropShadow dx="0" dy="10" stdDeviation="18" flood-color="#000000" flood-opacity="0.12"/>
    </filter>
  </defs>

  <rect width="1200" height="630" rx="48" fill="url(#bg)"/>
  <path d="M96 540C260 420 420 520 610 340C785 175 940 210 1104 120" stroke="url(#accent)" stroke-width="44" stroke-linecap="round"/>

  <g filter="url(#shadow)">
    <rect x="92" y="86" width="1016" height="458" rx="40" fill="#FFFFFF" fill-opacity="0.65"/>
  </g>

  <!-- Logo mark -->
  <image href="/logo-zpc.png" x="140" y="140" width="112" height="112" />

  <!-- Wordmark -->
  <text x="270" y="205" font-family="system-ui, -apple-system, Segoe UI, Roboto, sans-serif" font-size="52" font-weight="700">
    <tspan fill="#759940">Zorgpunt</tspan><tspan fill="#006AA5">Connect</tspan>
  </text>
  <text x="270" y="250" font-family="system-ui, -apple-system, Segoe UI, Roboto, sans-serif" font-size="18" font-weight="700" letter-spacing="2.5" fill="#64748B">ZPC</text>

  <!-- Tagline -->
  <text x="140" y="335" font-family="system-ui, -apple-system, Segoe UI, Roboto, sans-serif" font-size="34" font-weight="650" fill="#2D3748">
    De match die wťl werkt in de zorg
  </text>
  <text x="140" y="385" font-family="system-ui, -apple-system, Segoe UI, Roboto, sans-serif" font-size="24" font-weight="500" fill="#64748B">
    Zorgprofessionals en zorgorganisaties. Snel, persoonlijk en betrouwbaar.
  </text>

  <!-- Bottom accents -->
  <rect x="140" y="448" width="260" height="12" rx="6" fill="#759940"/>
  <rect x="416" y="448" width="210" height="12" rx="6" fill="#006AA5"/>
</svg>

